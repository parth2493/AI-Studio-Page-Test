<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VueXR Studio | AI 3D Generation</title>
    <meta
      name="description"
      content="VueXR Studio is a modern AI-powered interface for text-to-3D and image-to-3D generation workflows."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar glass-card">
      <div class="brand-wrap">
        <div class="logo-orb"></div>
        <a href="#" class="brand">VueXR Studio</a>
      </div>
      <button class="nav-btn">Launch Workspace</button>
    </header>

    <main class="page">
      <section class="hero glass-card reveal">
        <div>
          <p class="eyebrow">Modern AI 3D Pipeline</p>
          <h1>Create 3D assets from text and images in seconds.</h1>
          <p class="subtext">
            Generate concepts, apply AI textures, and prepare animation-ready assets from one clean workspace.
          </p>
        </div>
        <div class="hero-controls">
          <label for="prompt" class="control-label">Prompt input</label>
          <textarea id="prompt" placeholder="A futuristic red sports car with glossy reflections, studio lighting..."></textarea>

          <label for="imageUpload" class="control-label">Image upload</label>
          <div class="upload-row">
            <input id="imageUpload" type="file" accept="image/*" />
          </div>

          <button class="primary-btn" id="generateBtn">Generate</button>
        </div>
      </section>

      <section class="viewer-section glass-card reveal">
        <div class="viewer-header">
          <h2>Interactive 3D Viewer</h2>
          <div class="feature-pills">
            <span>Text to 3D</span>
            <span>Image to 3D</span>
            <span>AI texture</span>
            <span>Animation</span>
          </div>
        </div>
        <div id="viewer3d" aria-label="3D model viewer"></div>
      </section>

      <section class="workspace reveal">
        <aside class="workspace-sidebar glass-card">
          <h3>Sidebar</h3>
          <nav>
            <button class="side-item active">Text to 3D</button>
            <button class="side-item">Image to 3D</button>
            <button class="side-item">Models</button>
          </nav>
        </aside>

        <section class="workspace-main glass-card">
          <h3>Main panel</h3>
          <div class="main-grid">
            <div class="main-form">
              <label for="workspacePrompt">Prompt input</label>
              <textarea id="workspacePrompt" placeholder="Describe your object, style, and material..."></textarea>

              <label>Generation settings</label>
              <div class="settings-grid">
                <label class="setting-pill"><input type="checkbox" checked /> High detail</label>
                <label class="setting-pill"><input type="checkbox" checked /> AI texture</label>
                <label class="setting-pill"><input type="checkbox" /> Rig animation</label>
                <label class="setting-pill"><input type="checkbox" checked /> PBR materials</label>
              </div>

              <button class="primary-btn">Generate</button>
            </div>

            <div class="main-viewer-wrap">
              <p class="viewer-title">3D model viewer</p>
              <div id="workspaceViewer"></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';
      import { OrbitControls } from 'https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js';

      function createViewer(elId, variant = 'sphere') {
        const mount = document.getElementById(elId);
        if (!mount) return;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#f8f9fb');

        const camera = new THREE.PerspectiveCamera(50, mount.clientWidth / mount.clientHeight, 0.1, 100);
        camera.position.set(2.2, 1.8, 2.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(mount.clientWidth, mount.clientHeight);
        mount.appendChild(renderer.domElement);

        const hemi = new THREE.HemisphereLight(0xffffff, 0xb8c0d1, 1.2);
        scene.add(hemi);

        const dir = new THREE.DirectionalLight(0xffffff, 1.3);
        dir.position.set(2, 3, 2);
        scene.add(dir);

        const floor = new THREE.Mesh(
          new THREE.CircleGeometry(3, 64),
          new THREE.MeshStandardMaterial({ color: '#ffffff', metalness: 0.1, roughness: 0.95 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.7;
        scene.add(floor);

        const material = new THREE.MeshPhysicalMaterial({
          color: '#ed3237',
          metalness: 0.28,
          roughness: 0.2,
          clearcoat: 1,
          clearcoatRoughness: 0.1
        });

        const mesh =
          variant === 'torus'
            ? new THREE.Mesh(new THREE.TorusKnotGeometry(0.6, 0.22, 220, 32), material)
            : new THREE.Mesh(new THREE.IcosahedronGeometry(0.75, 1), material);

        scene.add(mesh);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.1;

        function animate() {
          requestAnimationFrame(animate);
          mesh.rotation.y += 0.004;
          mesh.rotation.x += 0.002;
          controls.update();
          renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
          const width = mount.clientWidth;
          const height = mount.clientHeight;
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
          renderer.setSize(width, height);
        });
      }

      createViewer('viewer3d', 'sphere');
      createViewer('workspaceViewer', 'torus');

      document.querySelectorAll('.reveal').forEach((el, i) => {
        el.style.animationDelay = `${i * 120}ms`;
      });

      const btn = document.getElementById('generateBtn');
      btn?.addEventListener('click', () => {
        btn.classList.add('pulse');
        setTimeout(() => btn.classList.remove('pulse'), 420);
      });
    </script>
  </body>
</html>
